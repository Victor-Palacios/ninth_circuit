name: Extract — Groq (Llama 3.3)

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.28.2 \
            openai==2.28.0 \
            pymupdf==1.27.2 \
            requests==2.32.5 \
            mlflow==3.10.1 \
            psycopg2-binary==2.9.10 \
            sendgrid==6.12.5

      - name: Run extraction
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROVIDER_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROVIDER_BASE_URL: "https://api.groq.com/openai/v1"
          MODEL: "llama-3.3-70b-versatile"
          MODEL_LABEL: "llama-3.3-70b-versatile"
          DATE_FROM: "2021-01-01"
          DATE_TO: "2021-12-31"
        run: python -m pipeline.extract --provider openai --limit 50

      - name: Send email notification
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          JOB_TYPE: "Extract"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY_FILE: extract_summary.txt
        run: python pipeline/notify.py "Groq (Llama 2021)"
