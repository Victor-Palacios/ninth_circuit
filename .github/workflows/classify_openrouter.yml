name: Classify — OpenRouter (hunter-alpha, 2021 Nov to 2026)

on:
  schedule:
    - cron: "0 10 * * *"   # 2:00 AM PT
    - cron: "0 16 * * *"   # 8:00 AM PT
    - cron: "0 22 * * *"   # 2:00 PM PT
    - cron: "0 4 * * *"    # 8:00 PM PT
  workflow_dispatch:

jobs:
  classify:
    permissions:
      contents: write
    uses: ./.github/workflows/_classify_shared.yml
    with:
      provider_name: openrouter
      provider_base_url: "https://openrouter.ai/api/v1"
      model: "openrouter/hunter-alpha"
      model_label: "openrouter/hunter-alpha"
      date_from: "2021-11-15"
      date_to: "2026-12-31"
      email_subject_label: "OpenRouter (hunter-alpha 2021-2026)"
    secrets:
      PROVIDER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
