name: Classify — OpenRouter (trinity-large, all dates)

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours
  workflow_dispatch:

jobs:
  classify:
    permissions:
      contents: write
    uses: ./.github/workflows/_classify_shared.yml
    with:
      provider_name: openrouter
      provider_base_url: "https://openrouter.ai/api/v1"
      model: "arcee-ai/trinity-large-preview:free"
      model_label: "arcee-ai/trinity-large-preview:free"
      date_from: "2020-01-01"
      date_to: "2020-12-31"
      classify_order: "desc"
      email_subject_label: "OpenRouter (trinity-large all dates)"
    secrets:
      PROVIDER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
