name: Extract — OpenRouter (trinity-large)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.28.2 \
            openai==2.28.0 \
            pymupdf==1.27.2 \
            requests==2.32.5 \
            mlflow==3.10.1 \
            psycopg2-binary==2.9.10

      - name: Run extraction
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m pipeline.extract --provider openrouter --limit 1
