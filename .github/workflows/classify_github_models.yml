name: Classify — GitHub Models (GPT-4o mini, 2026)

on:
  schedule:
    - cron: "0 16 * * *"   # 8:00 AM PT
  workflow_dispatch:

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.28.2 \
            openai==2.28.0 \
            pymupdf==1.27.2 \
            requests==2.32.5 \
            sendgrid==6.12.5

      - name: Run classifier
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          PROVIDER_API_KEY: ${{ github.token }}
          PROVIDER_BASE_URL: "https://models.inference.ai.azure.com"
          MODEL: "gpt-4o-mini"
          MODEL_LABEL: "gpt-4o-mini"
          DATE_FROM: "2026-01-01"
          DATE_TO: "2026-12-31"
          CLASSIFY_LIMIT: "2"
          CLASSIFY_SUMMARY_FILE: classify_summary.txt
        run: python -m pipeline.classify_free

      - name: Send email notification
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'EOF'
          import os
          from sendgrid import SendGridAPIClient
          from sendgrid.helpers.mail import Mail

          status = os.environ["JOB_STATUS"]
          run_url = os.environ["RUN_URL"]
          icon = "✅" if status == "success" else "❌"

          summary, asylum_links = "", []
          try:
              for line in open("classify_summary.txt").read().strip().splitlines():
                  if line.strip().startswith("http"):
                      asylum_links.append(line.strip())
                  else:
                      summary += line + "\n"
          except FileNotFoundError:
              summary = "No summary available."

          links_html = "<ul>" + "".join(f"<li><a href='{l}'>{l}</a></li>" for l in asylum_links) + "</ul>" if asylum_links else "<p>None found.</p>"

          sg = SendGridAPIClient(os.environ["SENDGRID_API_KEY"])
          sg.send(Mail(
              from_email="VPalacios@USFCA.EDU",
              to_emails="VPalacios@USFCA.EDU",
              subject=f"{icon} Classify GitHub Models (GPT-4o mini 2026) — {status}",
              html_content=f"<h3>{icon} {status}</h3><pre>{summary}</pre><h4>Asylum cases ({len(asylum_links)}):</h4>{links_html}<p><a href='{run_url}'>View logs</a></p>",
          ))
          print(f"Email sent.")
          EOF
