name: _Classify shared steps

on:
  workflow_call:
    inputs:
      provider_name:
        type: string
        required: true
      provider_base_url:
        type: string
        required: true
      model:
        type: string
        required: true
      model_label:
        type: string
        required: true
      date_from:
        type: string
        required: true
      date_to:
        type: string
        required: true
      email_subject_label:
        type: string
        required: true
    secrets:
      PROVIDER_API_KEY:
        required: true

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.28.2 \
            openai==2.28.0 \
            pymupdf==1.27.2 \
            requests==2.32.5 \
            sendgrid==6.12.5

      - name: Run classifier
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          PROVIDER_API_KEY: ${{ secrets.PROVIDER_API_KEY }}
          PROVIDER_BASE_URL: ${{ inputs.provider_base_url }}
          MODEL: ${{ inputs.model }}
          MODEL_LABEL: ${{ inputs.model_label }}
          DATE_FROM: ${{ inputs.date_from }}
          DATE_TO: ${{ inputs.date_to }}
          CLASSIFY_LIMIT: "500"
          CLASSIFY_SUMMARY_FILE: classify_summary.txt
        run: python -m pipeline.classify_free

      - name: Log results to CSV
        if: always()
        env:
          CLASSIFY_SUMMARY_FILE: classify_summary.txt
        run: |
          python pipeline/log_run.py ${{ inputs.provider_name }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add logs/classify_${{ inputs.provider_name }}.csv
          git commit -m "Log: ${{ inputs.provider_name }} run $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "Nothing to commit"
          git push

      - name: Send email notification
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLASSIFY_SUMMARY_FILE: classify_summary.txt
        run: python pipeline/notify.py "${{ inputs.email_subject_label }}"
