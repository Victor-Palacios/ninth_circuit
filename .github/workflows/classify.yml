name: Classify Opinions (DeepSeek)

on:
  schedule:
    # 8:00 AM Pacific = 16:00 UTC (PST) / 15:00 UTC (PDT)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.28.2 \
            openai==2.28.0 \
            pymupdf==1.27.2 \
            requests==2.32.5 \
            sendgrid==6.12.5

      - name: Run classifier
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLASSIFY_LIMIT: "10"
          CLASSIFY_SUMMARY_FILE: classify_summary.txt
        run: python -m pipeline.classify_openrouter

      - name: Send email notification
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'EOF'
          import os
          from sendgrid import SendGridAPIClient
          from sendgrid.helpers.mail import Mail

          status = os.environ["JOB_STATUS"]
          run_url = os.environ["RUN_URL"]
          icon = "✅" if status == "success" else "❌"

          # Parse summary file
          classified_total = "?"
          asylum_links = []
          try:
              with open("classify_summary.txt") as f:
                  lines = f.read().strip().splitlines()
              for line in lines:
                  if line.startswith("Classified"):
                      classified_total = line
                  elif line.strip().startswith("http"):
                      asylum_links.append(line.strip())
          except FileNotFoundError:
              pass

          # Build asylum links section
          if asylum_links:
              links_html = "<ul>" + "".join(
                  f"<li><a href='{l}'>{l}</a></li>" for l in asylum_links
              ) + "</ul>"
          else:
              links_html = "<p>None found in this batch.</p>"

          message = Mail(
              from_email="VPalacios@USFCA.EDU",
              to_emails="VPalacios@USFCA.EDU",
              subject=f"{icon} Ninth Circuit classify — {status}",
              html_content=(
                  f"<h3>{icon} Daily classify {status}</h3>"
                  f"<p>Model: deepseek-chat-v3-0324 via OpenRouter</p>"
                  f"<p>{classified_total}</p>"
                  f"<h4>Asylum-related cases ({len(asylum_links)}):</h4>"
                  f"{links_html}"
                  f"<p><a href='{run_url}'>View full run logs</a></p>"
              ),
          )

          api_key = os.environ.get("SENDGRID_API_KEY")
          if not api_key:
              print("SENDGRID_API_KEY not set, skipping email.")
          else:
              sg = SendGridAPIClient(api_key)
              sg.send(message)
              print(f"Email sent: classify {status}")
          EOF
