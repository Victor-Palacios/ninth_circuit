name: Classify — HuggingFace (Llama 3.3, 2020 Jan to 2021 Mar)

on:
  schedule:
    - cron: "0 10 * * *"   # 2:00 AM PT
    - cron: "0 16 * * *"   # 8:00 AM PT
    - cron: "0 22 * * *"   # 2:00 PM PT
    - cron: "0 4 * * *"    # 8:00 PM PT
  workflow_dispatch:

jobs:
  classify:
    permissions:
      contents: write
    uses: ./.github/workflows/_classify_shared.yml
    with:
      provider_name: huggingface
      provider_base_url: "https://router.huggingface.co/v1"
      model: "meta-llama/Llama-3.3-70B-Instruct"
      model_label: "meta-llama/Llama-3.3-70B-Instruct"
      date_from: "2020-01-01"
      date_to: "2021-03-24"
      email_subject_label: "HuggingFace (Llama 2020 Jan-Mar)"
    secrets:
      PROVIDER_API_KEY: ${{ secrets.HF_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
