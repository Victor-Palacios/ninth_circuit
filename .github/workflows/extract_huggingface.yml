name: Extract — HuggingFace (Llama 3.3)

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install \
            supabase==2.28.2 \
            openai==2.28.0 \
            pymupdf==1.27.2 \
            requests==2.32.5 \
            mlflow==3.10.1 \
            psycopg2-binary==2.9.10

      - name: Run extraction
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROVIDER_API_KEY: ${{ secrets.HF_TOKEN }}
          PROVIDER_BASE_URL: "https://router.huggingface.co/v1"
          MODEL: "meta-llama/Llama-3.3-70B-Instruct"
          MODEL_LABEL: "meta-llama/Llama-3.3-70B-Instruct"
          DATE_TO: "2022-12-31"
          OLDEST_FIRST: "1"
        run: python -m pipeline.extract --provider openai --limit 50
