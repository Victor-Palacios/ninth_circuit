name: Classify — Groq (Llama 3.3, 2021 Mar to 2021 Nov)

on:
  schedule:
    - cron: "40 3,7,11,15,19,23 * * *"  # every 4 hours starting 3:40 UTC
  workflow_dispatch:

jobs:
  classify:
    permissions:
      contents: write
    uses: ./.github/workflows/_classify_shared.yml
    with:
      provider_name: groq
      provider_base_url: "https://api.groq.com/openai/v1"
      model: "llama-3.3-70b-versatile"
      model_label: "llama-3.3-70b-versatile"
      date_from: "2021-03-24"
      date_to: "2021-11-15"
      email_subject_label: "Groq (Llama 2021 Mar-Nov)"
    secrets:
      PROVIDER_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
